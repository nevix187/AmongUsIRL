<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Among Us IRL</title>

  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>

  <!-- Zahnrad oben rechts -->
  <div class="settings-icon" id="settingsIcon">
    ⚙️
  </div>

  <!-- Adminbereich (anfangs versteckt) -->
  <div id="adminArea" class="admin-login hidden">
    <!-- Admin Login -->
    <input type="password" id="adminCode" placeholder="Admin-Code" />
    <button id="adminBtn">Login</button>

    <hr />

    <!-- Gerätecode Eingabe -->
    <input type="text" id="deviceCodeInput" placeholder="Gerätecode" />
    <button id="deviceJoinBtn">Beitreten</button>
  </div>

<main>
  <h1>Among US IRL</h1>

  <form id="joinForm" class="form-container">
    <input type="text" id="playerNameInput" placeholder="Dein Name" />
    <input type="text" id="codeInput" placeholder="Spielcode (z. B. G-1234)" />
    <button type="submit" id="submitBtn">Beitreten</button>
  </form>

  <div id="errorMsg"></div>
</main>


  <script src="/src/js/main.js"></script>
</body>
</html>
